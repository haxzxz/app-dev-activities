{% extends 'blog/base.html' %}

{% block content %}

<h2>All Posts</h2>

{% if posts %}
    <ul>
        {% for post in posts %}
            <li>
                <a href="{% url 'post_detail' post.id %}">
                    {{ post.title }}
                </a>
                <p>{{ post.content }}</p>
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>No posts available.</p>
{% endif %}

{% endblock %}
