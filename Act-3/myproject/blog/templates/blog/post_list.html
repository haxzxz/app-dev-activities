{% extends 'blog/base.html' %}

{% block content %}

<h2>All Posts</h2>

{% if posts %}
<p>
{% for post in posts %}
<a href="{% url 'post_detail' post.id %}">
{{ post.title }}
</a>
<p>{{ post.content }}</p>
{% endfor %}
</p>
{% else %}
<p>No posts available.</p>
{% endif %}

{% if user.is_autheticated %}
    <a href="{% url 'post_create' %}"><button>Create New Post</button></a>
{% endif %}

{% endblock %}
